!
!
!
!

!
upgrade fpd auto
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R2
!
boot-start-marker
boot-end-marker
!
logging message-counter syslog
!
no aaa new-model
ip source-route
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
no ipv6 cef
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
archive
 log config
  hidekeys
! 
!
!
!
!
ip tcp synwait-time 5
!
!
!
!
interface FastEthernet0/0
 ip address 100.100.21.2 255.255.255.252
 duplex half
!
interface FastEthernet1/0
 ip address 120.120.21.1 255.255.255.252
 duplex auto
 speed auto
!
interface FastEthernet1/1
 no ip address
 shutdown
 duplex auto
 speed auto
!
router ospf 1
 log-adjacency-changes
 redistribute bgp 100 subnets
 network 100.100.21.0 0.0.0.63 area 100
 network 120.120.21.0 0.0.0.63 area 100
!
router bgp 100
 no synchronization
 bgp log-neighbor-changes
 network 100.100.21.0 mask 255.255.255.252
 network 110.110.21.0 mask 255.255.255.252
 network 160.160.21.0 mask 255.255.255.252
 network 200.200.21.0 mask 255.255.255.240
 redistribute ospf 1
 neighbor 110.110.21.2 remote-as 100
 neighbor 120.120.21.2 remote-as 300
 neighbor 120.120.21.2 ebgp-multihop 255
 no auto-summary
!
ip forward-protocol nd
no ip http server
no ip http secure-server
!
!
!
no cdp log mismatch duplex
!
!
!
!
!
!
control-plane
!
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
end
